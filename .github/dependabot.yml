# Dependabot configuration for automated dependency updates
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

# Note: While this project uses 'uv' for package management, Dependabot uses 'pip' ecosystem
# because it monitors pyproject.toml and uv.lock files. Dependabot will create PRs that can be
# synced with 'uv sync' or 'uv lock --upgrade-package <package>'.
#
# Schedule: weekly on Sunday 04:00 in Europe/Amsterdam (CET/CEST). Runs off-hours; PRs are ready the same
# weekend or for Monday planning. open-pull-requests-limit caps concurrent PRs so newer dependency runs
# tend to supersede older open bumps.

version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    assignees:
      - "pkuppens"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group minor and patch updates together
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    assignees:
      - "pkuppens"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    # Group all GitHub Actions updates into a single PR
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
