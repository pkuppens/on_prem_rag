# OpenAPI 3.0 draft for /api/v1 RAG API (design companion; FastAPI still serves /openapi.json).
# See docs/technical/API_REDESIGN.md for full narrative and gap analysis.

openapi: 3.0.3
info:
  title: On-Prem RAG API
  version: 1.0.0-draft
  description: >
    Draft surface for /api/v1 after v0 removal. Ops endpoints /health and /metrics stay unversioned.

servers:
  - url: http://localhost:8000
    description: Local backend

tags:
  - name: documents
  - name: retrieval
  - name: qa
  - name: speech
  - name: parameters
  - name: health
  - name: chat

paths:
  /api/v1/documents:
    get:
      tags: [documents]
      summary: List documents
      operationId: listDocumentsV1
      responses:
        "200":
          description: Filenames in upload directory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
    post:
      tags: [documents]
      summary: Upload or enqueue document (sync or async)
      operationId: createDocumentV1
      parameters:
        - name: async
          in: query
          schema:
            type: boolean
            default: false
        - name: params_name
          in: query
          schema:
            type: string
            default: default
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Single file when async=false
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Multiple files when async=true (max 10)
      responses:
        "200":
          description: Duplicate content (sync) or partial async result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncUploadResponse"
        "201":
          description: New document accepted (sync)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncUploadResponse"

  /api/v1/documents/tasks/{task_id}:
    get:
      tags: [documents]
      summary: Processing task status
      operationId: getDocumentTaskStatusV1
    delete:
      tags: [documents]
      summary: Cancel or delete task-associated document
      operationId: deleteDocumentTaskV1

  /api/v1/documents/{document_id}:
    delete:
      tags: [documents]
      summary: Delete document by id
      operationId: deleteDocumentV1

  /api/v1/documents/ingest-from-url:
    post:
      tags: [documents]
      summary: Fetch and ingest document from URL
      operationId: ingestDocumentFromUrlV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestFromUrlRequest"
      responses:
        "200":
          description: Download started; background processing queued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/documents/{document_id}/content:
    get:
      tags: [documents]
      summary: Get file bytes or text content
      operationId: getDocumentContentV1

  /api/v1/retrieval/chunks:
    post:
      tags: [retrieval]
      summary: Retrieval-only chunk search
      operationId: searchChunksV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrievalChunksRequest"
      responses:
        "200":
          description: Chunks and metadata
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/retrieval/conversations:
    post:
      tags: [retrieval]
      summary: Medical conversation pipeline
      operationId: processConversationV1

  /api/v1/qa:
    post:
      tags: [qa]
      summary: RAG question answering
      operationId: askV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QaRequest"
      responses:
        "200":
          description: Answer with sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QaResponse"

  /api/v1/qa/voice:
    post:
      tags: [qa]
      summary: Voice RAG
      operationId: askVoiceV1

  /api/v1/speech/transcribe:
    post:
      tags: [speech]
      summary: Speech-to-text
      operationId: transcribeV1

  /api/v1/speech/transcribe/draft:
    post:
      tags: [speech]
      summary: Draft transcription
      operationId: transcribeDraftV1

  /api/v1/speech/info:
    get:
      tags: [speech]
      summary: STT capability info
      operationId: speechInfoV1

  /api/v1/parameter-sets:
    get:
      tags: [parameters]
      summary: List RAG parameter sets
      operationId: listParameterSetsV1

  /api/v1/health:
    get:
      tags: [health]
      summary: Aggregate health
      operationId: healthAggregateV1

  /api/v1/health/{component}:
    get:
      tags: [health]
      summary: Per-component health
      operationId: healthComponentV1

  /api/v1/chat:
    post:
      tags: [chat]
      summary: Multi-turn chat completion
      operationId: chatV1

  /api/v1/chat/stream:
    post:
      tags: [chat]
      summary: Streaming chat (SSE)
      operationId: chatStreamV1

components:
  schemas:
    DocumentListResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            type: string
    SyncUploadResponse:
      type: object
      properties:
        message:
          type: string
        file_id:
          type: string
        status:
          type: string
          enum: [uploaded, duplicate]
        processing:
          type: string
        created:
          type: boolean
    IngestFromUrlRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        params_name:
          type: string
          default: default
    RetrievalChunksRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        params_name:
          type: string
        top_k:
          type: integer
          minimum: 1
    QaRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
        strategy:
          type: string
          description: dense, sparse, hybrid, bm25
        params_name:
          type: string
        top_k:
          type: integer
    QaResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            type: object
            additionalProperties: true
        confidence:
          type: string
        chunks_retrieved:
          type: integer
        average_similarity:
          type: number
